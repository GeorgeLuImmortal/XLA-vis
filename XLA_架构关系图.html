<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XLA 认知大模型 — 技术全景关系图</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'Inter', sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
    width: 100%; height: 100%;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── central XLA hub ── */
  .xla-core {
    position: absolute;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ff8c00, #e65100);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 60px rgba(255,140,0,.45), 0 0 120px rgba(255,140,0,.2);
    z-index: 10;
    cursor: pointer;
    transition: transform .3s, box-shadow .3s;
    animation: pulse-core 3s ease-in-out infinite;
  }
  .xla-core:hover { transform: scale(1.08); box-shadow: 0 0 80px rgba(255,140,0,.6); }
  .xla-core h1 { font-size: 32px; font-weight: 700; color: #fff; letter-spacing: 4px; }
  .xla-core p { font-size: 11px; color: rgba(255,255,255,.85); margin-top: 2px; text-align: center; line-height: 1.3; }

  @keyframes pulse-core {
    0%, 100% { box-shadow: 0 0 60px rgba(255,140,0,.45), 0 0 120px rgba(255,140,0,.2); }
    50% { box-shadow: 0 0 80px rgba(255,140,0,.6), 0 0 160px rgba(255,140,0,.3); }
  }

  /* ── layer rings ── */
  .layer-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px dashed;
    opacity: .25;
    pointer-events: none;
  }
  .ring-x { width: 420px; height: 420px; border-color: #4fc3f7; }
  .ring-l { width: 420px; height: 420px; border-color: #ab47bc; }
  .ring-a { width: 420px; height: 420px; border-color: #66bb6a; }

  /* ── layer labels ── */
  .layer-label {
    position: absolute;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    opacity: .5;
    pointer-events: none;
    text-transform: uppercase;
  }

  /* ── connection lines (SVG) ── */
  svg.connections {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  svg.connections line {
    stroke-width: 2;
    stroke-dasharray: 8 4;
    opacity: .4;
  }
  svg.connections line.active {
    opacity: .9;
    stroke-width: 3;
    stroke-dasharray: none;
    filter: drop-shadow(0 0 6px currentColor);
  }

  /* ── work nodes ── */
  .work-node {
    position: absolute;
    width: 140px;
    border-radius: 16px;
    padding: 16px 14px;
    text-align: center;
    cursor: pointer;
    z-index: 5;
    transition: transform .35s cubic-bezier(.22,1,.36,1), box-shadow .35s, opacity .5s;
    opacity: 0;
    transform: scale(.6);
  }
  .work-node.visible { opacity: 1; transform: scale(1); }
  .work-node:hover { transform: scale(1.08) !important; }

  .work-node .icon { font-size: 28px; margin-bottom: 6px; }
  .work-node .name { font-size: 15px; font-weight: 700; color: #fff; }
  .work-node .layer-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 8px;
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .work-node .desc {
    font-size: 11px;
    color: rgba(255,255,255,.7);
    margin-top: 6px;
    line-height: 1.4;
  }

  /* layer-specific colors */
  .node-x { background: linear-gradient(135deg, rgba(33,150,243,.15), rgba(33,150,243,.05)); border: 1.5px solid rgba(33,150,243,.4); }
  .node-x:hover { box-shadow: 0 0 30px rgba(33,150,243,.3); }
  .node-x .layer-tag { background: rgba(33,150,243,.25); color: #4fc3f7; }

  .node-l { background: linear-gradient(135deg, rgba(171,71,188,.15), rgba(171,71,188,.05)); border: 1.5px solid rgba(171,71,188,.4); }
  .node-l:hover { box-shadow: 0 0 30px rgba(171,71,188,.3); }
  .node-l .layer-tag { background: rgba(171,71,188,.25); color: #ce93d8; }

  .node-a { background: linear-gradient(135deg, rgba(102,187,106,.15), rgba(102,187,106,.05)); border: 1.5px solid rgba(102,187,106,.4); }
  .node-a:hover { box-shadow: 0 0 30px rgba(102,187,106,.3); }
  .node-a .layer-tag { background: rgba(102,187,106,.25); color: #81c784; }

  /* ── detail panel ── */
  .detail-panel {
    position: fixed;
    right: -480px;
    top: 0;
    width: 440px;
    height: 100vh;
    background: rgba(15,15,30,.97);
    border-left: 1px solid rgba(255,255,255,.08);
    backdrop-filter: blur(20px);
    z-index: 100;
    transition: right .45s cubic-bezier(.22,1,.36,1);
    overflow-y: auto;
    padding: 40px 32px;
  }
  .detail-panel.open { right: 0; }
  .detail-panel .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
    border: none;
    color: #aaa;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .detail-panel .close-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
  .detail-panel h2 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .detail-panel .subtitle { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 20px; }
  .detail-panel .section-title {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 20px 0 8px;
  }
  .detail-panel .body-text {
    font-size: 14px;
    line-height: 1.8;
    color: rgba(255,255,255,.8);
  }
  .detail-panel .highlight {
    display: inline;
    background: rgba(255,140,0,.15);
    color: #ffb74d;
    padding: 0 4px;
    border-radius: 3px;
    font-weight: 500;
  }
  .detail-panel .stat-row {
    display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap;
  }
  .detail-panel .stat {
    flex: 1; min-width: 120px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .detail-panel .stat .val { font-size: 22px; font-weight: 700; color: #ffb74d; }
  .detail-panel .stat .label { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px; }

  /* ── flow arrows on canvas ── */
  .flow-label {
    position: absolute;
    font-size: 10px;
    color: rgba(255,255,255,.35);
    pointer-events: none;
    white-space: nowrap;
  }

  /* ── title bar ── */
  .title-bar {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    padding: 20px 32px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: none;
  }
  .title-bar .logo {
    width: 28px; height: 28px;
    background: #ff8c00;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; color: #fff;
  }
  .title-bar .title-text { font-size: 16px; font-weight: 600; color: rgba(255,255,255,.8); }
  .title-bar .badge {
    font-size: 10px;
    background: rgba(255,140,0,.2);
    color: #ffb74d;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
  }

  /* ── bottom legend ── */
  .legend {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 24px;
    z-index: 50;
    pointer-events: none;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,.5);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  /* ── animation intro ── */
  .intro-overlay {
    position: fixed;
    inset: 0;
    background: #0a0a1a;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity .8s;
  }
  .intro-overlay.hidden { opacity: 0; pointer-events: none; }
  .intro-overlay h1 { font-size: 48px; font-weight: 700; color: #ff8c00; letter-spacing: 8px; }
  .intro-overlay p { font-size: 16px; color: rgba(255,255,255,.5); margin-top: 8px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
</style>
</head>
<body>

<!-- Background particles -->
<canvas id="bg"></canvas>

<!-- Intro overlay -->

<script>
// ── Data ──
const works = [

  },
  {
    id: 'lta',
    name: 'LTA',

const coreDetail = {
  title: 'XLA 认知大模型',
  subtitle: '小米具身智能 · 更多模态、更高效、更可控',
  sections: [
    { heading: 'X — 多模态认知输入', text: '支持雷达、麦克风、摄像头、LiDAR、GPS、互联网信息、机器人本体感知等多种输入模态。<span class="highlight">SpatioLM</span> 和 <span class="highlight">GDA</span> 从两条互补路线增强空间感知能力。' },
    { heading: 'L — 高效的原生语言', text: '以 Latent CoT 和 Action Token 作为核心"语言"，基座模型为 Xiaomi MiMo-Embodied。<span class="highlight">OneVL</span> 实现一步潜空间推理，<span class="highlight">LTA</span> 探索并行扩散生成范式。' },
    { heading: 'A — 拟人化的行为', text: '输出层涵盖行为、世界模型、行为专家、奖励函数、状态估计、强化学习，通过闭环训练持续迭代。<span class="highlight">NanoVLA</span> 将完整VLA能力部署到边缘设备。' }
  ]
};

// ── Particle background ──
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    alpha: Math.random() * 0.3 + 0.05
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── Build scene ──
const scene = document.getElementById('scene');
const svgNS = 'http://www.w3.org/2000/svg';
const connSvg = document.getElementById('connSvg');
const cx = window.innerWidth / 2;
const cy = window.innerHeight / 2;

// Connection lines
const lines = {};
works.forEach(w => {
  const rad = (w.angle * Math.PI) / 180;
  const ex = cx + Math.cos(rad) * w.radius;
  const ey = cy + Math.sin(rad) * w.radius;

  const line = document.createElementNS(svgNS, 'line');
  line.setAttribute('x1', cx);
  line.setAttribute('y1', cy);
  line.setAttribute('x2', cx);
  line.setAttribute('y2', cy);
  line.style.stroke = w.colorLine;
  line.id = 'line-' + w.id;
  line.dataset.tx = ex;
  line.dataset.ty = ey;
  connSvg.appendChild(line);
  lines[w.id] = line;
});

// Work nodes
const nodeEls = {};
works.forEach(w => {
  const rad = (w.angle * Math.PI) / 180;
  const nx = cx + Math.cos(rad) * w.radius - 70;
  const ny = cy + Math.sin(rad) * w.radius - 50;

  const node = document.createElement('div');
  node.className = `work-node ${w.nodeClass}`;
  node.id = 'node-' + w.id;
  node.style.left = nx + 'px';
  node.style.top = ny + 'px';
  node.innerHTML = `
    <div class="icon">${w.icon}</div>
    <div class="name">${w.name}</div>
    <span class="layer-tag">${w.layerLabel}</span>
    <div class="desc">${w.shortDesc}</div>
  `;
  node.addEventListener('click', () => showDetail(w));
  node.addEventListener('mouseenter', () => {
    lines[w.id].classList.add('active');
  });
  node.addEventListener('mouseleave', () => {
    lines[w.id].classList.remove('active');
  });
  scene.appendChild(node);
  nodeEls[w.id] = node;
});

// ── Intro animation ──
const intro = document.getElementById('intro');
setTimeout(() => {
  intro.classList.add('hidden');
}, 1200);

// Staggered node entrance
setTimeout(() => {
  works.forEach((w, i) => {
    setTimeout(() => {
      nodeEls[w.id].classList.add('visible');
      // Animate line
      const line = lines[w.id];
      line.setAttribute('x2', line.dataset.tx);
      line.setAttribute('y2', line.dataset.ty);
    }, i * 200);
  });
}, 1600);

// ── Detail panel ──
const detailPanel = document.getElementById('detailPanel');
const detailContent = document.getElementById('detailContent');

function showDetail(w) {
  const d = w.detail;
  detailContent.innerHTML = `
    <h2>${d.title}</h2>
    <div class="subtitle">${d.subtitle}</div>
    <div class="section-title">问题</div>
    <div class="body-text">${d.problem}</div>
    <div class="section-title">核心方案</div>
    <div class="body-text">${d.method}</div>
    <div class="section-title">在 XLA 中的角色</div>
    <div class="body-text">${d.role}</div>
    <div class="section-title">关键指标</div>
    <div class="stat-row">
      ${d.stats.map(s => `<div class="stat"><div class="val">${s.val}</div><div class="label">${s.label}</div></div>`).join('')}
    </div>
  `;
  detailPanel.classList.add('open');
}

function showCoreDetail() {
  const c = coreDetail;
  detailContent.innerHTML = `
    <h2>${c.title}</h2>
    <div class="subtitle">${c.subtitle}</div>
    ${c.sections.map(s => `
      <div class="section-title">${s.heading}</div>
      <div class="body-text">${s.text}</div>
    `).join('')}
    <div class="section-title" style="margin-top:28px">技术叙事</div>
    <div class="body-text">
      从感知到行动的<span class="highlight">全链路效率革命</span>：感知侧（SpatioLM + GDA）双路线增强空间理解 → 推理侧（OneVL + LTA）压缩思考、并行表达 → 执行侧（NanoVLA）边缘端实时部署。
    </div>
  `;
  detailPanel.classList.add('open');
}

function closeDetail() {
  detailPanel.classList.remove('open');
}

// Close panel on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

// ── Handle resize ──
window.addEventListener('resize', () => {
  const ncx = window.innerWidth / 2;
  const ncy = window.innerHeight / 2;

  works.forEach(w => {
    const rad = (w.angle * Math.PI) / 180;
    const nx = ncx + Math.cos(rad) * w.radius - 70;
    const ny = ncy + Math.sin(rad) * w.radius - 50;
    nodeEls[w.id].style.left = nx + 'px';
    nodeEls[w.id].style.top = ny + 'px';

    const line = lines[w.id];
    line.setAttribute('x1', ncx);
    line.setAttribute('y1', ncy);
    line.setAttribute('x2', ncx + Math.cos(rad) * w.radius);
    line.setAttribute('y2', ncy + Math.sin(rad) * w.radius);
    line.dataset.tx = ncx + Math.cos(rad) * w.radius;
    line.dataset.ty = ncy + Math.sin(rad) * w.radius;
  });

  // Re-center core
  const core = document.getElementById('core');
  core.style.left = (ncx - 80) + 'px';
  core.style.top = (ncy - 80) + 'px';
});

// Initial centering of core
const core = document.getElementById('core');
core.style.position = 'absolute';
core.style.left = (cx - 80) + 'px';
core.style.top = (cy - 80) + 'px';

// SVG line animation (CSS transition via attribute change)
const style = document.createElement('style');
style.textContent = `
  svg.connections line {
    transition: x2 .6s cubic-bezier(.22,1,.36,1), y2 .6s cubic-bezier(.22,1,.36,1);
  }
`;
document.head.appendChild(style);
</script>
</body>
</html>
